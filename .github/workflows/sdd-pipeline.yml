name: SDD — Security-Driven Development

on:
  push:
    branches:
      - main
      - 'feat/**'
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      severity:
        description: 'Severidade mínima (LOW | MEDIUM | HIGH | CRITICAL)'
        required: false
        default: 'MEDIUM'

jobs:
  sdd-pipeline:
    runs-on: ubuntu-latest
    env:
      SEVERITY: ${{ github.event.inputs.severity || 'MEDIUM' }}
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SONAR_ORGANIZATION: ${{ secrets.SONAR_ORGANIZATION }}
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Preparar .codeguard
        run: mkdir -p .codeguard/prompts

      # ── SAST: Semgrep ──────────────────────────────────────
      - name: Instalar Semgrep
        run: pip install semgrep

      - name: Rodar Semgrep
        run: |
          semgrep \
            --config p/javascript \
            --config p/react \
            --config p/secrets \
            --config p/owasp-top-ten \
            --json \
            --output .codeguard/semgrep-raw.json \
            . || true

      # ── SCA: Trivy ─────────────────────────────────────────
      - name: Rodar Trivy
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'json'
          output: '.codeguard/trivy-raw.json'
          severity: '${{ env.SEVERITY }},CRITICAL'
          exit-code: '0'

      # ── Scripts Python ─────────────────────────────────────
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependências
        run: pip install requests

      - name: Normalizar findings
        run: python .codeguard/scripts/normalizer.py
        env:
          MIN_SEVERITY: ${{ env.SEVERITY }}

      - name: Gerar prompts SDD+TDD
        run: python .codeguard/scripts/prompt_generator.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Run lightweight security checks
        run: |
          node scripts/checkWorkflowRunSafety.js
          node scripts/checkPackageVulns.js

      # ── Unit tests + Coverage for SonarCloud (only unit tests) ───────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Cache node modules
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install Node dependencies
        run: npm ci

      - name: Run unit tests with coverage
        run: npm run test:unit:coverage

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/lcov.info

      - name: SonarCloud Scan
        if: ${{ github.repository == 'peacevan/gerenciador-cesta-basica' && env.SONAR_TOKEN != '' && env.SONAR_ORGANIZATION != '' }}
        uses: SonarSource/sonarcloud-github-action@v2
        with:
          args: >
            -Dsonar.organization=${{ env.SONAR_ORGANIZATION }}
            -Dsonar.projectKey=peacevan_gerenciador-cesta-basica
            -Dsonar.verbose=true
            -Dsonar.sources=src
            -Dsonar.javascript.lcov.reportPaths=coverage/lcov.info
            -Dsonar.exclusions=tests/e2e/**,playwright/**,public/**,netlify/**,coverage/**
            -Dsonar.login=${{ env.SONAR_TOKEN }}

      # ── Commitar resultados ────────────────────────────────
      - name: Commitar .codeguard
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .codeguard/
          git diff --staged --quiet || \
            git commit -m "chore(sdd): scan $(date +'%Y-%m-%d %H:%M') [$SEVERITY+]"
          git push
