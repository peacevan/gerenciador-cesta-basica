<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>SmartList — Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0d0f14;
      --surface: #13161e;
      --surface2: #1a1e2a;
      --border: #252a38;
      --border2: #2e3448;
      --text: #e8eaf0;
      --muted: #6b7490;
      --muted2: #4a5068;
      --accent: #4f7cff;
      --accent2: #7b9fff;
      --green: #22c55e;
      --green2: #16a34a;
      --amber: #f59e0b;
      --amber2: #d97706;
      --red: #ef4444;
      --red2: #dc2626;
      --teal: #14b8a6;
      --mono: 'JetBrains Mono', monospace;
      --sans: 'DM Sans', sans-serif;
      --radius: 10px;
      --radius-sm: 6px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      font-size: 14px;
      line-height: 1.5;
    }

    .container { max-width: 1280px; margin: 0 auto; padding: 24px 20px 48px; }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 28px;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--border);
    }
    .header-left { display: flex; align-items: center; gap: 14px; }
    .logo {
      width: 36px; height: 36px;
      background: var(--accent);
      border-radius: 8px;
      display: grid; place-items: center;
      font-family: var(--mono);
      font-weight: 600;
      font-size: 14px;
      color: white;
      letter-spacing: -0.5px;
    }
    .header-title { font-size: 17px; font-weight: 600; }
    .header-sub { font-size: 12px; color: var(--muted); margin-top: 2px; font-family: var(--mono); }
    .version-badge {
      background: var(--surface2);
      border: 1px solid var(--border2);
      border-radius: 999px;
      padding: 3px 10px;
      font-size: 12px;
      font-family: var(--mono);
      color: var(--accent2);
    }

    /* ── Layout ── */
    .layout { display: grid; grid-template-columns: 1fr 320px; gap: 18px; }
    @media(max-width: 960px) { .layout { grid-template-columns: 1fr; } }

    /* ── Cards ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px;
      margin-bottom: 14px;
    }
    .card:last-child { margin-bottom: 0; }
    .card-title {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin-bottom: 14px;
    }

    /* ── Overall Progress ── */
    .overall-row { display: flex; align-items: flex-end; justify-content: space-between; margin-bottom: 12px; }
    .overall-pct {
      font-size: 42px;
      font-weight: 600;
      font-family: var(--mono);
      color: var(--text);
      line-height: 1;
    }
    .overall-pct span { font-size: 20px; color: var(--muted); }
    .overall-meta { font-size: 13px; color: var(--muted); text-align: right; }
    .big-bar {
      height: 8px;
      background: var(--surface2);
      border-radius: 999px;
      overflow: hidden;
      margin-bottom: 10px;
    }
    .big-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--teal));
      border-radius: 999px;
      transition: width .8s cubic-bezier(.4,0,.2,1);
    }
    .phase-pills { display: flex; gap: 8px; flex-wrap: wrap; }
    .phase-pill {
      display: flex; align-items: center; gap: 6px;
      background: var(--surface2);
      border: 1px solid var(--border2);
      border-radius: 999px;
      padding: 4px 10px;
      font-size: 12px;
      cursor: pointer;
      transition: border-color .15s;
    }
    .phase-pill:hover { border-color: var(--accent); }
    .phase-pill.active { border-color: var(--accent); background: rgba(79,124,255,.1); color: var(--accent2); }
    .phase-pill .dot { width: 6px; height: 6px; border-radius: 50%; }

    /* ── MVP Tabs ── */
    .mvp-tabs { display: flex; gap: 4px; margin-bottom: 16px; background: var(--surface2); padding: 4px; border-radius: 8px; }
    .mvp-tab {
      flex: 1; padding: 7px; border-radius: 6px;
      border: none; background: transparent;
      color: var(--muted); font-family: var(--sans);
      font-size: 13px; font-weight: 500;
      cursor: pointer; transition: all .15s;
    }
    .mvp-tab.active { background: var(--surface); color: var(--text); box-shadow: 0 1px 4px rgba(0,0,0,.3); }

    /* ── Features ── */
    .features-list { display: flex; flex-direction: column; gap: 8px; }
    .feature-row {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 12px 14px;
      cursor: pointer;
      transition: border-color .15s;
    }
    .feature-row:hover { border-color: var(--border2); }
    .feature-row.expanded { border-color: var(--accent); }
    .feature-header { display: flex; align-items: center; gap: 10px; }
    .feature-name { font-weight: 500; font-size: 14px; flex: 1; }
    .feature-pct {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--muted);
      min-width: 32px;
      text-align: right;
    }
    .feature-mini-bar {
      margin-top: 8px;
      height: 3px;
      background: var(--border);
      border-radius: 999px;
      overflow: hidden;
    }
    .feature-mini-fill {
      height: 100%;
      border-radius: 999px;
      transition: width .6s ease;
    }
    .fill-done { background: var(--green); }
    .fill-progress { background: var(--amber); }
    .fill-todo { background: var(--muted2); }

    /* feature expand */
    .feature-tasks { margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border); display: none; flex-direction: column; gap: 6px; }
    .feature-row.expanded .feature-tasks { display: flex; }
    .feature-task-item {
      display: flex; align-items: center; gap: 8px;
      font-size: 12px; color: var(--muted);
      padding: 5px 8px;
      background: var(--surface);
      border-radius: 5px;
    }
    .task-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .task-dot.done { background: var(--green); }
    .task-dot.in { background: var(--amber); }
    .task-dot.todo { background: var(--muted2); }
    .task-label { flex: 1; }
    .task-pri {
      font-size: 10px; font-weight: 600; font-family: var(--mono);
      padding: 2px 5px; border-radius: 4px;
    }
    .pri-h { background: rgba(239,68,68,.15); color: var(--red); }
    .pri-m { background: rgba(245,158,11,.15); color: var(--amber); }
    .pri-l { background: rgba(107,116,144,.15); color: var(--muted); }

    /* ── Status badge ── */
    .status-badge {
      font-size: 10px; font-weight: 600; font-family: var(--mono);
      padding: 2px 7px; border-radius: 999px;
      letter-spacing: .03em;
    }
    .badge-done { background: rgba(34,197,94,.12); color: var(--green); border: 1px solid rgba(34,197,94,.2); }
    .badge-in { background: rgba(245,158,11,.12); color: var(--amber); border: 1px solid rgba(245,158,11,.2); }
    .badge-todo { background: rgba(107,116,144,.1); color: var(--muted); border: 1px solid var(--border); }

    /* ── Backlog ── */
    .backlog-item {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 12px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      margin-bottom: 6px;
      font-size: 13px;
    }
    .backlog-item:last-child { margin-bottom: 0; }
    .effort-badge {
      font-size: 10px; font-family: var(--mono); font-weight: 600;
      width: 20px; height: 20px; border-radius: 4px;
      display: grid; place-items: center; flex-shrink: 0;
    }
    .effort-s { background: rgba(34,197,94,.15); color: var(--green); }
    .effort-m { background: rgba(245,158,11,.15); color: var(--amber); }
    .effort-l { background: rgba(79,124,255,.15); color: var(--accent2); }

    /* ── Sidebar metrics ── */
    .metric-row { display: flex; align-items: center; justify-content: space-between; padding: 9px 0; border-bottom: 1px solid var(--border); }
    .metric-row:last-child { border-bottom: none; }
    .metric-label { font-size: 13px; color: var(--muted); }
    .metric-val { font-family: var(--mono); font-size: 14px; font-weight: 600; }

    .donut-wrap { display: flex; align-items: center; gap: 14px; margin-bottom: 14px; }
    .donut { position: relative; width: 64px; height: 64px; flex-shrink: 0; }
    .donut svg { transform: rotate(-90deg); }
    .donut-label {
      position: absolute; inset: 0;
      display: grid; place-items: center;
      font-family: var(--mono); font-size: 13px; font-weight: 600;
    }
    .donut-info .title { font-weight: 600; font-size: 14px; }
    .donut-info .sub { font-size: 12px; color: var(--muted); margin-top: 2px; }

    .test-row { display: flex; justify-content: space-between; font-size: 12px; padding: 5px 0; }
    .test-bar { height: 4px; background: var(--surface2); border-radius: 999px; overflow: hidden; margin-top: 3px; }
    .test-fill { height: 100%; background: var(--accent); border-radius: 999px; }
    .coverage-grid { margin-top: 12px; display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .coverage-box { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 8px 10px; }
    .coverage-box .val { font-family: var(--mono); font-size: 15px; font-weight: 700; }
    .coverage-box .lbl { color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: .3px; }

    .sec-item { display: flex; justify-content: space-between; align-items: center; padding: 7px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
    .sec-item:last-child { border-bottom: none; }

    .perf-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .perf-box { background: var(--surface2); border-radius: var(--radius-sm); padding: 10px 12px; }
    .perf-box .val { font-family: var(--mono); font-size: 20px; font-weight: 600; margin-bottom: 2px; }
    .perf-box .lbl { font-size: 11px; color: var(--muted); }

    /* ── Highlights ── */
    .highlights { display: flex; flex-direction: column; gap: 8px; }
    .highlight { display: flex; align-items: center; gap: 10px; padding: 10px 12px; background: var(--surface2); border-radius: var(--radius-sm); border-left: 3px solid var(--green); }
    .highlight.warn { border-left-color: var(--amber); }
    .highlight .hl-title { font-weight: 500; font-size: 13px; }
    .highlight .hl-note { font-size: 12px; color: var(--muted); margin-top: 1px; }

    footer { margin-top: 32px; text-align: center; font-size: 12px; color: var(--muted2); font-family: var(--mono); }
  </style>
</head>

<script>
const $ = id => document.getElementById(id);

// ── helpers ──────────────────────────────────────────────────────
function fmtDate(iso) {
  return new Date(iso).toLocaleString('pt-BR', { day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit' });
}

function statusBadge(s) {
  const map = { DONE:['badge-done','Done'], IN_PROGRESS:['badge-in','Em andamento'], TODO:['badge-todo','A fazer'] };
  const [cls, label] = map[s] || map.TODO;
  return `<span class="status-badge ${cls}">${label}</span>`;
}

function fillColor(s) {
  if (s === 'DONE') return 'fill-done';
  if (s === 'IN_PROGRESS') return 'fill-progress';
  return 'fill-todo';
}

function priClass(p) {
  return p === 'HIGH' ? 'pri-h' : p === 'MEDIUM' ? 'pri-m' : 'pri-l';
}

function dotClass(s) {
  return s === 'DONE' ? 'done' : s === 'IN_PROGRESS' ? 'in' : 'todo';
}

// ── state ─────────────────────────────────────────────────────────
let currentMvp = 'mvp1';

// ── render overall ────────────────────────────────────────────────
function renderOverall() {
  const allFeatures = [...DATA.mvps.mvp1.features, ...DATA.mvps.mvp2.features];
  const pct = Math.round(allFeatures.reduce((s,f) => s + f.progress, 0) / allFeatures.length);
  const done = allFeatures.filter(f => f.status === 'DONE').length;
  const inprog = allFeatures.filter(f => f.status === 'IN_PROGRESS').length;

  $('overall-pct').innerHTML = `${pct}<span>%</span>`;
  $('overall-meta').innerHTML = `${done} completas · ${inprog} em andamento<br><span style="color:var(--muted2)">${allFeatures.length} features total</span>`;
  setTimeout(() => { $('big-bar').style.width = pct + '%'; }, 100);

  const pills = [
    { label: `MVP 1: ${DATA.mvps.mvp1.features.filter(f=>f.status==='DONE').length}/${DATA.mvps.mvp1.features.length}`, color: '#22c55e', mvp: 'mvp1' },
    { label: `MVP 2: ${DATA.mvps.mvp2.features.filter(f=>f.status==='DONE').length}/${DATA.mvps.mvp2.features.length}`, color: '#4f7cff', mvp: 'mvp2' }
  ];
  $('phase-pills').innerHTML = pills.map(p =>
    `<div class="phase-pill ${currentMvp===p.mvp?'active':''}" onclick="switchMvp('${p.mvp}')">
      <div class="dot" style="background:${p.color}"></div>${p.label}
    </div>`
  ).join('');
}

// ── render features ───────────────────────────────────────────────
function renderFeatures() {
  const mvp = DATA.mvps[currentMvp];
  $('features-title').textContent = `Features — ${mvp.label}`;
  $('backlog-title').textContent = `Backlog — ${mvp.label}`;

  $('features-list').innerHTML = mvp.features.map(f => {
    const tasksHtml = f.tasks.map(t =>
      `<div class="feature-task-item">
        <div class="task-dot ${dotClass(t.status)}"></div>
        <div class="task-label">${t.desc}</div>
        <div class="task-pri ${priClass(t.priority)}">${t.priority[0]}</div>
      </div>`
    ).join('');

    return `<div class="feature-row" id="fr-${f.id}" onclick="toggleFeature('${f.id}')">
      <div class="feature-header">
        <div class="feature-name">${f.name}</div>
        ${statusBadge(f.status)}
        <div class="feature-pct">${f.progress}%</div>
      </div>
      <div class="feature-mini-bar">
        <div class="feature-mini-fill ${fillColor(f.status)}" style="width:${f.progress}%"></div>
      </div>
      <div class="feature-tasks">${tasksHtml}</div>
    </div>`;
  }).join('');

  // backlog
  $('backlog-list').innerHTML = mvp.backlog.map(b =>
    `<div class="backlog-item">
      <div class="effort-badge effort-${b.effort.toLowerCase()}">${b.effort}</div>
      <div style="flex:1">${b.desc}</div>
      <div class="task-pri ${priClass(b.priority)}">${b.priority[0]}</div>
    </div>`
  ).join('');
}

// ── toggle feature expand ─────────────────────────────────────────
function toggleFeature(id) {
  const el = document.getElementById('fr-' + id);
  el.classList.toggle('expanded');
}

// ── switch mvp tab ────────────────────────────────────────────────
function switchMvp(mvp) {
  currentMvp = mvp;
  renderFeatures();
  renderOverall();
  renderTabs();
}

function renderTabs() {
  $('mvp-tabs').innerHTML = Object.entries(DATA.mvps).map(([key, mvp]) =>
    `<button class="mvp-tab ${currentMvp===key?'active':''}" onclick="switchMvp('${key}')">${mvp.label}</button>`
  ).join('');
}

// ── sidebar ───────────────────────────────────────────────────────
function renderSidebar() {
  // Highlights
  $('highlights').innerHTML = DATA.highlights.map(h =>
    `<div class="highlight ${h.ok?'':'warn'}">
      <div>
        <div class="hl-title">${h.title}</div>
        <div class="hl-note">${h.note}</div>
      </div>
    </div>`
  ).join('');

  // Tests donut
  const pct = DATA.tests.overall;
  const circ = 2 * Math.PI * 26;
  const dash = (pct / 100) * circ;
  setTimeout(() => {
    $('donut-circle').setAttribute('stroke-dasharray', `${dash} ${circ}`);
  }, 200);
  $('donut-label').textContent = pct + '%';
  $('test-sub').textContent = `${DATA.tests.unit.count} testes unitários`;
  $('unit-stat').textContent = `${DATA.tests.unit.count} testes · ${DATA.tests.unit.pct}%`;
  $('int-stat').textContent = `${DATA.tests.integration.count} testes · ${DATA.tests.integration.pct}%`;
  $('cov-lines').textContent = `${DATA.tests.coverage.lines.toFixed(2)}%`;
  $('cov-statements').textContent = `${DATA.tests.coverage.statements.toFixed(2)}%`;
  $('cov-functions').textContent = `${DATA.tests.coverage.functions.toFixed(2)}%`;
  $('cov-branches').textContent = `${DATA.tests.coverage.branches.toFixed(2)}%`;
  setTimeout(() => {
    $('unit-fill').style.width = DATA.tests.unit.pct + '%';
    $('int-fill').style.width = DATA.tests.integration.pct + '%';
  }, 300);

  // Security
  $('sec-list').innerHTML = DATA.security.map(s => {
    const color = s.status === 'OK' ? 'var(--green)' : s.status === 'WARN' ? 'var(--amber)' : 'var(--muted)';
    const dot = `<div style="width:7px;height:7px;border-radius:50%;background:${color};flex-shrink:0"></div>`;
    return `<div class="sec-item">${dot}<span style="flex:1">${s.label}</span><span style="color:${color};font-family:var(--mono);font-size:11px;font-weight:600">${s.status}</span></div>`;
  }).join('');

  // Perf
  const perfItems = [
    { val: DATA.perf.apiMs + 'ms', lbl: 'API Latency' },
    { val: DATA.perf.buildS + 's', lbl: 'Build time' },
    { val: DATA.perf.bundleKb + 'KB', lbl: 'Bundle size' },
    { val: DATA.perf.lighthouse, lbl: 'Lighthouse' }
  ];
  $('perf-grid').innerHTML = perfItems.map(p =>
    `<div class="perf-box"><div class="val">${p.val}</div><div class="lbl">${p.lbl}</div></div>`
  ).join('');
}

// ── init ──────────────────────────────────────────────────────────
(function init() {
  $('version-badge').textContent = DATA.project.version;
  $('header-sub').textContent = `${DATA.project.phase} · atualizado ${fmtDate(DATA.project.updated)}`;
  $('footer').innerHTML = `<small>SmartList Dashboard · ${fmtDate(DATA.project.updated)}</small>`;

  renderOverall();
  renderTabs();
  renderFeatures();
  renderSidebar();
})();
</script>
</body>
</html>
