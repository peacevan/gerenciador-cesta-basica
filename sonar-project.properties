# SonarCloud basic properties - update YOUR_ORG if needed or set secrets
sonar.projectKey=peacevan_gerenciador-cesta-basica
sonar.organization=peacevan
sonar.sources=src
# Test locations: tests/ folder and in-repo __tests__ directories
sonar.tests=tests,src/**/__tests__
# Include typical test file name patterns
sonar.test.inclusions=**/*test.js,**/*.spec.js,**/*.test.jsx,**/*.spec.jsx,src/**/__tests__/**
sonar.language=js
sonar.sourceEncoding=UTF-8
sonar.javascript.lcov.reportPaths=coverage/lcov.info
# Exclude E2E/Playwright and unrelated folders from Sonar analysis
sonar.exclusions=tests/e2e/**,playwright/**,public/**,netlify/**,coverage/**
